name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  python-ci:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint & format check
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests with coverage
        run: pytest -q --cov=src --cov-report=term-missing

  python-classify:
    name: Classify failure
    runs-on: ubuntu-latest
    needs: python-ci
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Re-run tests and capture log
        run: pytest -q --tb=long 2>&1 | tee /tmp/ci-log.txt || true

      - name: Classify failure
        id: classify
        run: python scripts/classify_failure.py --log-file /tmp/ci-log.txt --github-output "$GITHUB_OUTPUT"

      - name: Post classification comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/ci-log.txt', 'utf8').slice(-2000);
            const taxonomy = '${{ steps.classify.outputs.taxonomy }}' || 'UNKNOWN';
            const body = `## CI Failure Classification: \`${taxonomy}\`\n\n<details><summary>Test output (last 2000 chars)</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  typescript-ci:
    name: TypeScript lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Test
        run: npm run test --workspaces --if-present

      - name: Build
        run: npm run build --workspaces --if-present
